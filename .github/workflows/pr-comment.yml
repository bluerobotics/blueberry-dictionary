name: Comment Dictionary Validation on PR

on:
  workflow_run:
    workflows: ["Validate Dictionary"]
    types:
      - completed

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: read

jobs:
  comment:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Download validation artifact
        uses: actions/download-artifact@v4
        with:
          name: validation-output
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Find PR number
        id: pr
        run: |
          echo "number=${{ github.event.workflow_run.pull_requests[0].number }}" >> "$GITHUB_OUTPUT"

      - name: Comment validation errors on PR
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Dictionary Validation Errors'
            echo ''
            echo '```'
            sed 's/\x1b\[[0-9;]*m//g' validation-output.txt
            echo '```'
          } > comment-body.md

          gh pr comment "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --body-file comment-body.md
