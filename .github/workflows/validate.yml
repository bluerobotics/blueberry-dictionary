name: Validate Dictionary

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download blueberry-cli
        run: |
          curl -fsSL -o blueberry-cli \
            https://github.com/bluerobotics/blueberry-compiler/releases/download/v0.0.1/blueberry-cli-linux-x86_64
          chmod +x blueberry-cli

      - name: Validate dictionary
        id: validate
        continue-on-error: true
        env:
          NO_COLOR: "1"
        run: |
          set -o pipefail
          ./blueberry-cli . 2>&1 | tee validation-output.txt

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: |
          echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload validation output
        if: github.event_name == 'pull_request' && steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: |
            validation-output.txt
            pr-number.txt

      - name: Check for failures
        if: steps.validate.outcome == 'failure'
        run: exit 1
